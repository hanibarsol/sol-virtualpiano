<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר בדיקה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; user-select: none; -webkit-user-select: none; touch-action: none; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; font-size: 24px; }
        #piano-container { display: flex; justify-content: center; align-items: flex-start; width: 100%; height: 80vh; padding-top: 5vh; }
        .piano { display: flex; position: relative; direction: ltr; height: 100%; }
        .key { position: relative; border: 1px solid #000; box-sizing: border-box; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 15px; z-index: 10; }
        .white-key { width: 60px; height: 100%; background-color: white; border-radius: 0 0 5px 5px; }
        .black-key { width: 40px; height: 60%; background-color: #333; z-index: 20; margin-left: -20px; margin-right: -20px; border-radius: 0 0 3px 3px; }
        .key.active { background-color: #ffeb3b !important; }
        .character-img { width: 80%; pointer-events: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="start-screen">לחצי כאן כדי להפעיל את הפסנתר</div>

<div id="piano-container">
    <div class="piano" id="piano"></div>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const pianoElement = document.getElementById('piano');
    
    // הפעלת האודיו בלחיצה הראשונה
    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
        console.log("Audio Context started");
    });

    const characterImages = ["דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg", "דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg"];

    const sampler = new Tone.Sampler({
        urls: { "C3": "c3.wav", "D3": "d3.wav", "E3": "e3.wav", "C4": "c4.wav" },
        baseUrl: "./",
        onload: () => console.log("Sounds loaded!"),
        onerror: (e) => console.log("Error loading sound", e)
    }).toDestination();

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octaves = [3, 4];
    let whiteKeyIndex = 0;

    octaves.forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex] || "";
                img.className = 'character-img';
                key.appendChild(img);
                whiteKeyIndex++;
            }

            // פונקציית לחיצה מאוחדת
            const handleStart = (e) => {
                if(e) e.preventDefault();
                console.log("Pressed:", fullNote);
                key.classList.add('active'); // חייב לצבוע בצהוב מיד!
                try {
                    sampler.triggerAttack(fullNote);
                } catch(err) {
                    console.log("Sound error:", err);
                }
            };

            const handleEnd = () => {
                key.classList.remove('active');
                sampler.triggerRelease(fullNote);
            };

            // הוספת המאזינים בצורה הכי פשוטה שיש
            key.onmousedown = handleStart;
            key.onmouseup = handleEnd;
            key.onmouseleave = handleEnd;
            key.ontouchstart = handleStart;
            key.ontouchend = handleEnd;

            pianoElement.appendChild(key);
        });
    });
</script>
</body>
</html>
