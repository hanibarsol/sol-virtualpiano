<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הפסנתר הוירטואלי של סול</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a1a1a; user-select: none; -webkit-user-select: none; 
            touch-action: none; font-family: sans-serif;
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000; /* ודואים שזה מעל הכל */
        }

        #sustain-btn {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            background-color: #444;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* זה העיצוב כשהכפתור דולק */
        #sustain-btn.active {
            background-color: #ffeb3b !important;
            color: black !important;
            border-color: #fdd835;
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.8);
            transform: scale(1.05);
        }

        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 3000; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden;
            display: flex; align-items: center; 
        }

        #piano-container { display: flex; height: 85vh; min-width: max-content; }
        .piano { display: flex; position: relative; direction: ltr; }
        
        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding-bottom: 20px;
        }

        .white-key { width: 70px; height: 100%; background-color: white; z-index: 1; border-radius: 0 0 8px 8px; }
        .black-key { width: 40px; height: 60%; background-color: #333; z-index: 2; margin-left: -20px; margin-right: -20px; border-radius: 0 0 5px 5px; }
        
        .key.active { background-color: #ffeb3b !important; }
        .character-img { width: 90%; max-height: 50%; pointer-events: none; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="start-screen"><h1>לחצי כאן להפעלה 🎹</h1></div>

<div id="controls">
    <button id="sustain-btn">פדאל (Sustain): כבוי</button>
</div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano"></div>
    </div>
</div>

        },

        isSustainActive = !isSustainActive;
        
        if (isSustainActive) {
            sustainBtn.innerText = "פדאל (Sustain): דולק";
            sustainBtn.classList.add('active');
            sampler.set({ release: 4 }); // מאריך סאונד
        } else {
            sustainBtn.innerText = "פדאל (Sustain): כבוי";
            sustainBtn.classList.remove('active');
            sampler.set({ release: 0.5 }); // מקצר סאונד
        }
    };

        await Tone.start();
        startScreen.style.display = 'none';
    };

    const pianoElement = document.getElementById('piano');
