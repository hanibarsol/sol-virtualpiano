<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הפסנתר של סול</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #000; user-select: none; -webkit-user-select: none; 
            touch-action: none; 
        }

        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100vw; height: 100vh; overflow-x: auto; overflow-y: hidden;
            background-color: #000; display: flex;
        }

        #piano-container { 
            display: flex; height: 100%; width: 100%; min-width: 100vw; 
            padding: 0; margin: 0;
        }

        .piano { display: flex; position: relative; direction: ltr; height: 100%; width: 100%; }
        
        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .white-key { flex: 1 0 auto; width: 7.14vw; min-width: 60px; height: 100%; background-color: white; z-index: 1; border-radius: 0 0 10px 10px; }
        .black-key { width: 4.5vw; min-width: 36px; height: 60%; background-color: #333; z-index: 2; margin-left: -2.25vw; margin-right: -2.25vw; border-radius: 0 0 6px 6px; }
        
        .key.active { background-color: #ffeb3b !important; }

        .character-img { 
            width: 90%; height: auto; 
            max-height: 70%; 
            object-fit: contain; pointer-events: none; 
            /* שינוי לערך גמיש: מרווח של 10% מגובה המקש במקום 60 פיקסלים */
            margin-bottom: 10%; 
        }
    </style>
</head>
<body>

<div id="start-screen"><h1>הפסנתר של סול 🎹</h1></div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    // הגדרות אופטימיזציה קיצוניות למניעת דיליי
    Tone.context.latencyHint = 'fastest';
    Tone.context.lookAhead = 0;

    const sampler = new Tone.Sampler({
        urls: {
            "C3": "c3.mp4", "C#3": "cd3.mp4", "D3": "d3.mp4", "D#3": "dd3.mp4", "E3": "e3.mp4",
            "F3": "f3.wav", "F#3": "fd3.mp4", "G3": "g3.mp4", "G#3": "gd3.mp4", "A3": "a3.mp4", "A#3": "ad3.mp4", "B3": "b3.mp4",
            "C4": "c4.mp4", "C#4": "cd4.mp4", "D4": "d4.mp4", "D#4": "dd4.mp4", "E4": "e4.mp4",
            "F4": "f4.mp4", "F#4": "fd4.mp4", "G4": "g4.mp4", "G#4": "gd4.mp4", "A4": "a4.mp4", "A#4": "ad4.mp4", "B4": "b4.mp4"
        },
        baseUrl: "",
        release: 4, // הורדתי מעט מ-9 ל-4 כדי שהמעבד לא ייחנק מעודף צלילים דולקים
        onload: () => console.log("Ready")
    }).toDestination();

    // הגבלת כמות הצלילים שנדלקים בו זמנית (מציל טאבלטים מדיליי)
    sampler.polyphony = 12; 

    const startScreen = document.getElementById('start-screen');
    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
    });

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const characterImages = ["דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png", "דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png"];
    const pianoElement = document.getElementById('piano');
    let whiteKeyIndex = 0;

    [3, 4].forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                const topSpacer = document.createElement('div');
                topSpacer.style.flexGrow = "1";
                key.appendChild(topSpacer);

                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex] || "";
                img.className = 'character-img';
                key.appendChild(img);
                whiteKeyIndex++;
            }

            const play = () => {
                key.classList.add('active');
                // triggerAttackRelease עם זמן קצר מבטיח שהצליל לא "יתקע" בתור
                sampler.triggerAttack(fullNote);
            };
            const stop = () => {
                key.classList.remove('active');
                sampler.triggerRelease(fullNote);
            };

            key.onmousedown = (e) => { e.preventDefault(); play(); };
            key.onmouseup = stop;
            key.ontouchstart = (e) => { e.preventDefault(); play(); };
            key.ontouchend = (e) => { e.preventDefault(); stop(); };

            pianoElement.appendChild(key);
        });
    });

    // שיפור מנגנון ההחלקה למניעת עומס
    let lastNote = null;
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('key') && el.dataset.note !== lastNote) {
            sampler.triggerAttack(el.dataset.note);
            el.classList.add('active');
            lastNote = el.dataset.note;
            setTimeout(() => { 
                el.classList.remove('active');
                if (lastNote === el.dataset.note) lastNote = null;
            }, 300);
        }
    }, { passive: false });
</script>
</body>
</html>
