<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר בדיקה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #222; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            -webkit-touch-callout: none;
        }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; font-size: 24px; }
        #piano-container { display: flex; justify-content: center; align-items: flex-start; width: 100%; height: 80vh; padding-top: 5vh; }
        .piano { display: flex; position: relative; direction: ltr; height: 100%; }
        
        .key { 
            position: relative; 
            border: 1px solid #000; 
            box-sizing: border-box; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            padding-bottom: 15px; 
            z-index: 10; 
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
            /* מונע מהדפדפן לנסות להבין מה יש בתוך הקליד, הוא מתייחס רק לקליד עצמו */
            -webkit-tap-highlight-color: transparent;
        }
        
        .white-key { width: 60px; height: 100%; background-color: white; border-radius: 0 0 5px 5px; }
        
        /* שיפור ה-z-index של הקלידים השחורים כדי להפריד שכבות מגע */
        .black-key { 
            width: 40px; 
            height: 60%; 
            background-color: #333; 
            z-index: 30; 
            margin-left: -20px; 
            margin-right: -20px; 
            border-radius: 0 0 3px 3px; 
        }
        
        .key.active { background-color: #ffeb3b !important; }
        
        .character-img { 
            width: 80%; 
            margin-bottom: 10px; 
            /* חיוני: מונע לחלוטין מהתמונה להגיב למגע או להפריע לקליד שמתחתיה */
            pointer-events: none; 
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
</head>
<body>



<div id="piano-container">
    <div class="piano" id="piano"></div>
</div>

<script>
    // שים לב שהסרנו את מאזיני ה-document.addEventListener הישנים למעלה
    const startScreen = document.getElementById('start-screen');
    const pianoElement = document.getElementById('piano');

    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
        console.log("Audio Context started");
    });

    const characterImages = ["דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg", "דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg"];

    const sampler = new Tone.Sampler({
        urls: { "C3": "c3.wav", "D3": "d3.wav", "E3": "e3.wav", "C4": "c4.wav" },
        baseUrl: "./",
        onload: () => console.log("Sounds loaded!"),
        onerror: (e) => console.log("Error loading sound", e)
    }).toDestination();

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octaves = [3, 4];
    let whiteKeyIndex = 0;

    // בניית המקלדת
    octaves.forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;
            key.dataset.isPlaying = "false"; 

            if (!isBlack) {
                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex] || "";
                img.className = 'character-img';
                key.appendChild(img);
                whiteKeyIndex++;
            }

            // לוגיקת הפעלה
            const playNote = () => {
                if (key.dataset.isPlaying === "true") return; 
                key.dataset.isPlaying = "true";
                key.classList.add('active');
                try {
                    sampler.triggerAttack(fullNote);
                } catch(err) { console.log(err); }
            };

            // לוגיקת כיבוי
            const stopNote = () => {
                if (key.dataset.isPlaying === "false") return; 
                key.dataset.isPlaying = "false";
                key.classList.remove('active');
                try {
                    sampler.triggerRelease(fullNote);
                } catch(err) { console.log(err); }
            };

            // --- מנגנון Pointer Events אחוד (מחשב + נייד) ---

            key.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                // הקסם: נועל את כל אירועי המגע הבאים לאלמנט הזה, לא משנה לאן האצבע תזוז
                key.setPointerCapture(e.pointerId);
                playNote();
            });

            key.addEventListener('pointermove', (e) => {
                e.preventDefault();
                // ברגע שיש פוינטר קאפצ'ר, האירוע הזה ימשיך לירות רק עבור הקליד המקורי
                // אנחנו פשוט מונעים מהדפדפן לבצע פעולות גלילה/תזוזה מובנות
            });

            key.addEventListener('pointerup', (e) => {
                e.preventDefault();
                key.releasePointerCapture(e.pointerId);
                stopNote();
            });

            key.addEventListener('pointercancel', (e) => {
                e.preventDefault();
                key.releasePointerCapture(e.pointerId);
                stopNote();
            });

            pianoElement.appendChild(key);
        });
    });
</script>
</body>
</html>
