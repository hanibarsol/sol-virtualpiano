<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר בדיקה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #222; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            -webkit-touch-callout: none;
        }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; font-size: 24px; }
        #piano-container { display: flex; justify-content: center; align-items: flex-start; width: 100%; height: 80vh; padding-top: 5vh; }
        .piano { display: flex; position: relative; direction: ltr; height: 100%; }
        
        .key { 
            position: relative; 
            border: 1px solid #000; 
            box-sizing: border-box; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            padding-bottom: 15px; 
            z-index: 10; 
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
            /* מונע מהדפדפן לנסות להבין מה יש בתוך הקליד, הוא מתייחס רק לקליד עצמו */
            -webkit-tap-highlight-color: transparent;
        }
        
        .white-key { width: 60px; height: 100%; background-color: white; border-radius: 0 0 5px 5px; }
        
        /* שיפור ה-z-index של הקלידים השחורים כדי להפריד שכבות מגע */
        .black-key { 
            width: 40px; 
            height: 60%; 
            background-color: #333; 
            z-index: 30; 
            margin-left: -20px; 
            margin-right: -20px; 
            border-radius: 0 0 3px 3px; 
        }
        
        .key.active { background-color: #ffeb3b !important; }
        
        .character-img { 
            width: 80%; 
            margin-bottom: 10px; 
            /* חיוני: מונע לחלוטין מהתמונה להגיב למגע או להפריע לקליד שמתחתיה */
            pointer-events: none; 
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
</head>
<body>



<div id="piano-container">
    <div class="piano" id="piano"></div>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const pianoElement = document.getElementById('piano');
    
    // אובייקט לאחסון המיקום של כל קליד במסך
    let keyBounds = [];
    
    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
        
        // חישוב מיקומים *לאחר* שהמסך מתנקה והמקלדת מוצגת במלואה
        setTimeout(calculateKeyBounds, 100);
        console.log("Audio Context started");
    });

    const characterImages = ["דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg", "דו.jpg", "רה.jpg", "מי.jpg", "פה.jpg", "סול.jpg", "לה.jpg", "סי.jpg"];

    const sampler = new Tone.Sampler({
        urls: { "C3": "c3.wav", "D3": "d3.wav", "E3": "e3.wav", "C4": "c4.wav" },
        baseUrl: "./",
        onload: () => console.log("Sounds loaded!"),
        onerror: (e) => console.log("Error loading sound", e)
    }).toDestination();

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octaves = [3, 4];
    let whiteKeyIndex = 0;

    // יצירת הקלידים (נשמר כמו קודם)
    octaves.forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex] || "";
                img.className = 'character-img';
                key.appendChild(img);
                whiteKeyIndex++;
            }
            pianoElement.appendChild(key);
        });
    });

    const keys = document.querySelectorAll('.key');

    // פונקציית עזר לחישוב מדויק של מיקום כל קליד
    function calculateKeyBounds() {
        keyBounds = [];
        keys.forEach(key => {
            const rect = key.getBoundingClientRect();
            keyBounds.push({
                element: key,
                note: key.dataset.note,
                top: rect.top,
                bottom: rect.bottom,
                left: rect.left,
                right: rect.right,
                isBlack: key.classList.contains('black-key'),
                active: false // מצב הלחיצה
            });
        });
    }

    // חישוב מחדש אם משנים את כיוון המכשיר (rotate)
    window.addEventListener('resize', calculateKeyBounds);

    // ********** הליבה של הפתרון לניידים **********
    
    // מונע את כל ברירות המחדל של המגע
    document.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

    // פונקציה אבסולוטית למציאת הקליד מתחת לאצבע
    function getKeyAtPoint(x, y) {
        // שלב א': חיפוש רק בין הקלידים השחורים (Z-Index גבוה)
        const blackKeys = keyBounds.filter(b => b.isBlack);
        for (let b of blackKeys) {
            if (x >= b.left && x <= b.right && y >= b.top && y <= b.bottom) {
                return b;
            }
        }
        // שלב ב': אם לא מצאנו, חיפוש בין הלבנים (Z-Index נמוך)
        const whiteKeys = keyBounds.filter(b => !b.isBlack);
        for (let b of whiteKeys) {
            if (x >= b.left && x <= b.right && y >= b.top && y <= b.bottom) {
                return b;
            }
        }
        return null; // אין קליד
    }

    // ניהול מגע מרכזי על כל שטח המקלדת
    pianoElement.addEventListener('touchstart', handleAllTouch);
    pianoElement.addEventListener('touchmove', handleAllTouch);
    pianoElement.addEventListener('touchend', handleAllTouchEnd);
    pianoElement.addEventListener('touchcancel', handleAllTouchEnd);

    function handleAllTouch(e) {
        e.preventDefault();
        
        // יצירת סט של כל הקלידים הפעילים כרגע *אחרי החישוב המחודש*
        let notesToStayActive = new Set();
        
        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            const boundUnderFinger = getKeyAtPoint(touch.clientX, touch.clientY);
            
            if (boundUnderFinger) {
                notesToStayActive.add(boundUnderFinger.note);
                
                // התחלת צליל חדש (אם לא היה פעיל)
                if (!boundUnderFinger.active) {
                    boundUnderFinger.active = true;
                    boundUnderFinger.element.classList.add('active');
                    sampler.triggerAttack(boundUnderFinger.note);
                }
            }
        }
        
        // עצימת צלילים שנעזבו
        keyBounds.forEach(b => {
            if (b.active && !notesToStayActive.has(b.note)) {
                b.active = false;
                b.element.classList.remove('active');
                sampler.triggerRelease(b.note);
            }
        });
    }

    // כשמפסיקים מגע
    function handleAllTouchEnd(e) {
        if (e.touches.length === 0) {
            // הכל כבוי
            keyBounds.forEach(b => {
                b.active = false;
                b.element.classList.remove('active');
                sampler.triggerRelease(b.note);
            });
        } else {
            // האצבע עדיין על המסך (רק אצבע אחת הורמה)
            handleAllTouch(e);
        }
    }
</script>
</body>
</html>
