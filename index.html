<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר דיגיטלי</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #piano-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            height: 80vh;
            padding-top: 5vh;
        }

        .piano {
            display: flex;
            position: relative;
            direction: ltr; /* מבטיח שהסדר יהיה משמאל לימין */
            height: 100%;
        }

        .key {
            position: relative;
            border: 1px solid #000;
            box-sizing: border-box;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
        }

        .white-key {
            width: 60px;
            height: 100%;
            background-color: white;
            z-index: 1;
            border-radius: 0 0 5px 5px;
        }

        .black-key {
            width: 40px;
            height: 60%;
            background-color: black;
            z-index: 2;
            margin-left: -20px;
            margin-right: -20px;
            border-radius: 0 0 3px 3px;
        }

        .key.active {
            background-color: #ffeb3b !important; /* צהוב כשלחוץ */
        }

        .character-img {
            width: 85%;
            pointer-events: none;
            -webkit-user-drag: none;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .white-key { width: 45px; }
            .black-key { width: 30px; margin-left: -15px; margin-right: -15px; }
        }
    </style>
</head>
<body>

<div id="piano-container">
    <div class="piano" id="piano"></div>
</div>

<script>
    const pianoElement = document.getElementById('piano');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octaves = [3, 4]; 
    
    // רשימת דמויות (הוסיפי כאן את הקישורים שלך)
    const characters = [
        "https://via.placeholder.com/50?text=C3", // דו 3
        "https://via.placeholder.com/50?text=D3", // רה 3
        "https://via.placeholder.com/50?text=E3", // מי 3
        "https://via.placeholder.com/50?text=F3", // פה 3
        "https://via.placeholder.com/50?text=G3", // סול 3
        "https://via.placeholder.com/50?text=A3", // לה 3
        "https://via.placeholder.com/50?text=B3", // סי 3
        "https://via.placeholder.com/50?text=C4", // דו 4
        "https://via.placeholder.com/50?text=D4", // רה 4
        "https://via.placeholder.com/50?text=E4", // מי 4
        "https://via.placeholder.com/50?text=F4", // פה 4
        "https://via.placeholder.com/50?text=G4", // סול 4
        "https://via.placeholder.com/50?text=A4", // לה 4
        "https://via.placeholder.com/50?text=B4"  // סי 4
    ];

    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    let whiteKeyIndex = 0;

    octaves.forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                if (characters[whiteKeyIndex]) {
                    const img = document.createElement('img');
                    img.src = characters[whiteKeyIndex];
                    img.className = 'character-img';
                    img.oncontextmenu = (e) => e.preventDefault();
                    key.appendChild(img);
                }
                whiteKeyIndex++;
            }

            // פונקציות לחיצה
            const startHandler = (e) => {
                e.preventDefault();
                playNote(fullNote, key);
            };
            const endHandler = (e) => {
                e.preventDefault();
                stopNote(fullNote, key);
            };

            key.addEventListener('touchstart', startHandler);
            key.addEventListener('touchend', endHandler);
            key.addEventListener('mousedown', startHandler);
            key.addEventListener('mouseup', endHandler);
            key.addEventListener('mouseleave', endHandler);
            
            // גרירה מעל הקלידים
            key.addEventListener('mouseenter', (e) => {
                if (e.buttons === 1) playNote(fullNote, key);
            });

            pianoElement.appendChild(key);
        });
    });

    function playNote(note, element) {
        if (Tone.context.state !== 'running') Tone.start();
        synth.triggerAttack(note);
        element.classList.add('active');
    }

    function stopNote(note, element) {
        synth.triggerRelease(note);
        element.classList.remove('active');
    }

    // מניעת גלילה וזום במובייל
    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) e.preventDefault(); // מניעת זום עם שתי אצבעות
        
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('key') && !el.classList.contains('active')) {
            playNote(el.dataset.note, el);
        }
    }, { passive: false });

    window.oncontextmenu = (e) => e.preventDefault();
</script>

</body>
</html>
