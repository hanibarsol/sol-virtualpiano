<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הפסנתר הוירטואלי של סול</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a1a1a; user-select: none; -webkit-user-select: none; 
            touch-action: none; 
        }
        
        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 9999; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100vw;
            height: 100vh;
            overflow-x: auto; 
            overflow-y: hidden;
            display: flex;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        #piano-container { 
            display: flex; 
            width: 100%; 
            min-width: 100vw; 
            height: 85vh; 
            position: relative;
        }

        .piano { 
            display: flex; 
            position: relative; 
            direction: ltr; 
            height: 100%; 
            width: 100%;
        }

        .key { 
            position: relative; 
            border: 1px solid #000; 
            box-sizing: border-box; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            padding-bottom: 25px;
            flex: 1 0 0; 
            background-color: white;
            z-index: 1;
            border-radius: 0 0 8px 8px;
            min-width: 60px;
            overflow: visible; /* מאפשר לקלידים השחורים לצוף החוצה */
        }

        .black-key { 
            position: absolute;
            width: 34px; 
            height: 55%; 
            background-color: #333; 
            z-index: 10; 
            right: -17px; /* מיקום על התפר */
            border-radius: 0 0 5px 5px;
            top: 0;
            border: 1px solid #000;
        }

        .key.active { background-color: #ffeb3b !important; }

        .character-img { 
            width: 90%; 
            height: auto;
            max-height: 55%; 
            object-fit: contain;
            pointer-events: none; 
            -webkit-user-drag: none;
            display: block;
        }

        .spacer { flex-grow: 1; width: 100%; }

        @media (max-width: 800px) {
            .key { min-width: 50px; }
            .black-key { width: 28px; right: -14px; }
        }
    </style>
</head>
<body>

<div id="start-screen" onclick="startPiano()">
    <h1>לחצו כאן להפעלה 🎹</h1>
</div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const pianoElement = document.getElementById('piano');
    let isMouseDown = false;

    // פונקציית ההפעלה
    async function startPiano() {
        try {
            await Tone.start();
            console.log("Audio Context Started");
            startScreen.style.display = 'none';
        } catch (e) {
            console.error("Failed to start audio:", e);
        }
    }

    // הגדרות לייטנסי
    Tone.context.latencyHint = 'fastest';
    Tone.context.lookAhead = 0;

    document.body.onmouseup = () => { isMouseDown = false; };
