<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר דמויות</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        
        /* מסך פתיחה */
        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 9999; 
            cursor: pointer; text-align: center;
        }

        #piano-scroll-wrapper { width: 100%; height: 100%; overflow-x: auto; display: flex; align-items: center; }
        
        #piano-container { 
            display: flex; height: 85vh; min-width: 100%; width: max-content; 
            position: relative; margin: 0 auto;
        }

        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding-bottom: 20px; background-color: white;
            width: 65px; height: 100%; border-radius: 0 0 8px 8px; flex-shrink: 0;
        }

        .black-key { 
            position: absolute; width: 40px; height: 60%; background-color: #333; 
            z-index: 10; margin-left: -20px; border-radius: 0 0 5px 5px; 
            left: 100%; top: 0; border: 1px solid #000;
        }

        .key.active { background-color: #ffeb3b !important; }
        .character-img { width: 90%; max-height: 55%; object-fit: contain; pointer-events: none; }
        .spacer { flex-grow: 1; }

        @media (max-width: 768px) {
            .key { width: 55px; }
            .black-key { width: 34px; margin-left: -17px; }
        }
    </style>
</head>
<body>

<div id="start-screen" onclick="this.style.display='none'; startAudio();">
    <h1>לחצי כאן להפעלה 🎹</h1>
</div>

<div id="piano-scroll-wrapper">
    <div id="piano-container" id="piano"></div>
</div>

    let isMouseDown = false;

    // פונקציית הפעלת סאונד

        await Tone.start();
        console.log("Audio started");
    }

    document.onmousedown = () => { isMouseDown = true; };
    document.onmouseup = () => { isMouseDown = false; };

        },

    }).toDestination();

                key.className = 'key';
                const spc = document.createElement('div');
