<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסנתר דמויות - גרסה יציבה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a1a1a; user-select: none; -webkit-user-select: none; 
            touch-action: none; 
        }
        
        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden;
            display: flex; align-items: center; -webkit-overflow-scrolling: touch;
        }

        #piano-container { 
            display: flex; height: 85vh; padding: 0; margin: 0 auto;
            min-width: 100%; width: max-content;
        }

        .piano { display: flex; position: relative; direction: ltr; height: 100%; }

        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            cursor: pointer; display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: center; 
            padding-bottom: 20px; background-color: white;
            width: 65px; height: 100%; border-radius: 0 0 8px 8px;
        }

        .black-key { 
            position: absolute; width: 40px; height: 60%; background-color: #333; 
            z-index: 10; margin-left: -20px; margin-right: -20px; 
            border-radius: 0 0 5px 5px; left: 100%; top: 0;
        }

        .key.active { background-color: #ffeb3b !important; }

        .character-img { 
            width: 90%; max-height: 55%; object-fit: contain;
            pointer-events: none; -webkit-user-drag: none;
        }

        .spacer { flex-grow: 1; }

        @media (max-width: 768px) {
            .key { width: 55px; }
            .black-key { width: 34px; margin-left: -17px; margin-right: -17px; }
        }
    </style>
</head>
<body>

<div id="start-screen"><h1>לחצו כאן להפעלה 🎹</h1></div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const pianoElement = document.getElementById('piano');
    let isMouseDown = false;

    // הפעלה בטוחה
    startScreen.onclick = async () => {
        await Tone.start();
        startScreen.style.display = 'none';
    };

    document.onmousedown = () => { isMouseDown = true; };
    document.onmouseup = () => { isMouseDown = false; };

    const characterImages = ["דו.png", "רה.png", "מי.png", "פה.png
