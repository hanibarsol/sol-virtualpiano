<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הפסנתר של סול</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #000; user-select: none; -webkit-user-select: none; 
            touch-action: none; 
        }

        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100vw; height: 100vh; overflow-x: auto; overflow-y: hidden;
            display: block; background-color: #000;
        }

        #piano-container { 
            display: flex; height: 100%; width: max-content; 
            padding: 0; margin: 0;
        }

        .piano { display: flex; position: relative; direction: ltr; height: 100%; }
        
        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding-bottom: 20px;
        }

        /* הגדרת רוחב קבועה כדי שלא יהיו רווחים מוזרים */
        .white-key { width: 80px; height: 100%; background-color: white; z-index: 1; border-radius: 0 0 10px 10px; }
        .black-key { width: 46px; height: 60%; background-color: #333; z-index: 2; margin-left: -23px; margin-right: -23px; border-radius: 0 0 6px 6px; }
        
        .key.active { background-color: #ffeb3b !important; }

        .character-img { 
            width: 90%; height: auto; max-height: 55%; 
            object-fit: contain; pointer-events: none; margin-bottom: 5px; 
        }
    </style>
</head>
<body>

<div id="start-screen"><h1>לחצי כאן להפעלה 🎹</h1></div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano"></div>
    </div>
</div>

<script>
    // הגדרות לייטנסי נמוך במיוחד למניעת דיליי בטאבלטים
    Tone.context.latencyHint = 'fastest';
    Tone.context.lookAhead = 0;

    const startScreen = document.getElementById('start-screen');
    let isMouseDown = false;

    // הגדרת הסאונד ללא אפקטים כבדים כדי למנוע דיליי, אבל עם Release ארוך מאוד
    const sampler = new Tone.Sampler({
        urls: {
            "C3": "c3.wav", "C#3": "cd3.wav", "D3": "d3.wav", "D#3": "dd3.wav", "E3": "e3.wav",
            "F3": "f3.wav", "F#3": "fd3.wav", "G3": "g3.wav", "G#3": "gd3.wav", "A3": "a3.wav", "A#3": "ad3.wav", "B3": "b3.wav",
            "C4": "c4.wav", "C#4": "cd4.wav", "D4": "d4.wav", "D#4": "dd4.wav", "E4": "e4.wav",
            "F4": "f4.wav", "F#4": "fd4.wav", "G4": "g4.wav", "G#4": "gd4.wav", "A4": "a4.wav", "A#4": "ad4.wav", "B4": "b4.wav"
        },
        baseUrl: "sounds/",
        release: 5, // צליל ארוך מאוד (כמו פדאל תמידי)
        onload: () => console.log("מוכן!")
    }).toDestination();

    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
    });

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const characterImages = ["דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png", "דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png"];
    const pianoElement = document.getElementById('piano');
    let whiteKeyIndex = 0;

    [3, 4].forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                const spacer = document.createElement('div');
                spacer.style.flexGrow = "1";
                key.appendChild(spacer);
                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex] || "";
                img.className = 'character-img';
                key.appendChild(img);
                whiteKeyIndex++;
            }

            const play = () => {
                key.classList.add('active');
                sampler.triggerAttack(fullNote);
            };
            const stop = () => {
                key.classList.remove('active');
                sampler.triggerRelease(fullNote);
            };

            key.onmousedown = (e) => { e.preventDefault(); isMouseDown = true; play(); };
            key.onmouseup = () => { isMouseDown = false; stop(); };
            key.onmouseenter = () => { if (isMouseDown) play(); };
            key.onmouseleave = stop;
            key.ontouchstart = (e) => { e.preventDefault(); play(); };
            key.ontouchend = (e) => { e.preventDefault(); stop(); };

            pianoElement.appendChild(key);
        });
    });

    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('key') && !el.classList.contains('active')) {
            sampler.triggerAttack(el.dataset.note);
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 400);
        }
    }, { passive: false });
</script>
</body>
</html>
