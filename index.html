<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הפסנתר הוירטואלי של סול</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a1a1a; user-select: none; -webkit-user-select: none; 
            touch-action: none; 
        }

        /* עיצוב כפתור הפדאל */
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 500;
        }

        #sustain-btn {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            font-family: sans-serif;
            background-color: #444;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #sustain-btn.active {
            background-color: #ffeb3b;
            color: black;
            border-color: #ffeb3b;
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.6);
            transform: scale(1.05);
        }

        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; 
            cursor: pointer; text-align: center; 
        }

        #piano-scroll-wrapper {
            width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden;
            display: flex; justify-content: flex-start; align-items: center; 
            -webkit-overflow-scrolling: touch;
        }

        #piano-container { 
            display: flex; width: 100%; min-width: max-content; height: 90vh; 
        }

        .piano { display: flex; position: relative; direction: ltr; height: 100%; flex-grow: 1; }
        
        .key { 
            position: relative; border: 1px solid #000; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding-bottom: 20px;
        }

        .white-key { width: 7.14vw; min-width: 60px; height: 100%; background-color: white; z-index: 1; border-radius: 0 0 8px 8px; }
        .black-key { width: 4.5vw; min-width: 36px; height: 60%; background-color: #333; z-index: 2; margin-left: -2.25vw; margin-right: -2.25vw; border-radius: 0 0 5px 5px; }
        
        .key.active { background-color: #ffeb3b !important; }

        .character-img { 
            width: 90%; height: auto; max-height: 55%; 
            object-fit: contain; pointer-events: none; 
            -webkit-user-drag: none; margin-bottom: 5px; 
        }

        @media (max-height: 500px) {
            .white-key { min-width: 50px; }
            .black-key { min-width: 32px; }
            .character-img { max-height: 45%; } 
        }
    </style>
</head>
<body>

<div id="start-screen"><h1>לחצי כאן להפעלה 🎹</h1></div>

<div id="controls">
    <button id="sustain-btn">פדאל (Sustain): כבוי</button>
</div>

<div id="piano-scroll-wrapper">
    <div id="piano-container">
        <div class="piano" id="piano" oncontextmenu="return false;"></div>
    </div>
</div>

<script>
    const startScreen = document.getElementById('start-screen');
    const sustainBtn = document.getElementById('sustain-btn');
    let isMouseDown = false;
    let isSustainActive = false;

    // --- הגדרות סאונד ---
    Tone.context.latencyHint = 'fastest';
    Tone.context.lookAhead = 0;

   // 1. הדהוד קצת יותר עדין כדי שלא יפריע כשהפדאל כבוי
const reverb = new Tone.Reverb({
    decay: 2.5, // הורדנו מ-4 כדי להרגיש את ההבדל
    wet: 0.2    // הורדנו מ-0.3 כדי שהצליל היבש יהיה ברור יותר
}).toDestination();

// 2. הגדרת הסאמפלר עם release קצר מאוד כברירת מחדל
const sampler = new Tone.Sampler({
    urls: {
        "C3": "c3.wav", "C#3": "cd3.wav", "D3": "d3.wav", "D#3": "dd3.wav", "E3": "e3.wav",
        "F3": "f3.wav", "F#3": "fd3.wav", "G3": "g3.wav", "G#3": "gd3.wav", "A3": "a3.wav", "A#3": "ad3.wav", "B3": "b3.wav",
        "C4": "c4.wav", "C#4": "cd4.wav", "D4": "d4.wav", "D#4": "dd4.wav", "E4": "e4.wav",
        "F4": "f4.wav", "F#4": "fd4.wav", "G4": "g4.wav", "G#4": "gd4.wav", "A4": "a4.wav", "A#4": "ad4.wav", "B4": "b4.wav"
    },
    baseUrl: "sounds/",
    release: 0.5, // <--- התחלה קצרה מאוד!
    onload: () => console.log("כל הצלילים נטענו!")
}).connect(reverb);

// 3. עדכון פונקציית הכפתור
sustainBtn.addEventListener('click', () => {
    isSustainActive = !isSustainActive;
    
    if (isSustainActive) {
        sustainBtn.innerText = "פדאל (Sustain): דולק";
        sustainBtn.classList.add('active');
        // שינוי ה-release לערך גבוה
        sampler.set({ release: 4 }); 
    } else {
        sustainBtn.innerText = "פדאל (Sustain): כבוי";
        sustainBtn.classList.remove('active');
        // החזרה לערך קצר מאוד
        sampler.set({ release: 0.5 }); 
    }
});

    // התחלת הסאונד בלחיצה על מסך הפתיחה
    startScreen.addEventListener('click', async () => {
        await Tone.start();
        startScreen.style.display = 'none';
    });

    // ניהול מצב פדאל
    sustainBtn.addEventListener('click', () => {
        isSustainActive = !isSustainActive;
        if (isSustainActive) {
            sustainBtn.innerText = "פדאל (Sustain): דולק";
            sustainBtn.classList.add('active');
            sampler.release = 4; // צליל ארוך
        } else {
            sustainBtn.innerText = "פדאל (Sustain): כבוי";
            sustainBtn.classList.remove('active');
            sampler.release = 1; // צליל רגיל
        }
    });

    document.body.onmousedown = () => { isMouseDown = true; };
    document.body.onmouseup = () => { isMouseDown = false; };

    const characterImages = [
        "דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png",
        "דו.png", "רה.png", "מי.png", "פה.png", "סול.png", "לה.png", "סי.png"
    ];

    const pianoElement = document.getElementById('piano');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octaves = [3, 4];
    let whiteKeyIndex = 0;

    octaves.forEach(octave => {
        notes.forEach(note => {
            const isBlack = note.includes('#');
            const fullNote = note + octave;
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.note = fullNote;

            if (!isBlack) {
                const spacer = document.createElement('div');
                spacer.style.flexGrow = "1"; 
                key.appendChild(spacer);

                const img = document.createElement('img');
                img.src = characterImages[whiteKeyIndex];
                img.className = 'character-img';
                img.draggable = false;
                key.appendChild(img);
                whiteKeyIndex++;
            }

            const play = () => {
                key.classList.add('active');
                sampler.triggerAttack(fullNote);
            };
            const stop = () => {
                key.classList.remove('active');
                sampler.triggerRelease(fullNote);
            };

            key.onmousedown = (e) => { e.preventDefault(); play(); };
            key.onmouseup = stop;
            key.onmouseleave = stop;
            key.onmouseenter = () => { if (isMouseDown) play(); };
            key.ontouchstart = (e) => { e.preventDefault(); play(); };
            key.ontouchend = (e) => { e.preventDefault(); stop(); };

            pianoElement.appendChild(key);
        });
    });

    // תמיכה בהחלקה על המקשים במובייל
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('key') && !el.classList.contains('active')) {
            sampler.triggerAttack(el.dataset.note);
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 300);
        }
    }, { passive: false });
</script>
</body>
</html>
